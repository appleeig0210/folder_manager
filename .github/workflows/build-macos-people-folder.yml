name: Build macOS (PeopleFolderManager Tauri)

on:
  workflow_dispatch:
  push:
    tags:
      - "people-v*"

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Intel 處理器 Mac（x86_64）— 請勿在 Apple Silicon 上當主程式使用（會顯示不支援）
          - runner: macos-15-intel
            package_label: Intel-x86_64
          # M1 / M2 / M3 等 Apple Silicon（arm64）
          - runner: macos-latest
            package_label: AppleSilicon-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r folder_manage/requirements.txt pyinstaller
          python -V
          pip -V

      - name: Install Node dependencies
        run: |
          npm ci
          npm ci --prefix frontend

      - name: Generate icons
        run: |
          npm run icons
          bash scripts/generate_macos_icons.sh

      - name: Build Python sidecar
        run: |
          npm run sidecar:mac

      - name: Build Tauri app
        run: |
          npm run tauri:build

      - name: Show bundle output
        run: |
          find src-tauri/target/release/bundle -maxdepth 3 -print || true

      - name: Package app
        run: |
          ZIP_NAME="PeopleFolderManager-${{ matrix.package_label }}.zip"
          APP_PATH="$(find src-tauri/target/release/bundle/macos -maxdepth 1 -name '*.app' -print -quit)"
          if [ -n "$APP_PATH" ]; then
            ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$ZIP_NAME"
          else
            echo "Tauri .app output not found"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: PeopleFolderManager-${{ matrix.package_label }}
          path: |
            PeopleFolderManager-${{ matrix.package_label }}.zip
            src-tauri/target/release/bundle/dmg/*.dmg
