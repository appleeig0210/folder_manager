name: Build macOS (PeopleFolderManager)

on:
  workflow_dispatch:
  push:
    tags:
      - "people-v*"

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Intel 處理器 Mac（x86_64）— 請勿在 Apple Silicon 上當主程式使用（會顯示不支援）
          - runner: macos-15-intel
            package_label: Intel-x86_64
          # M1 / M2 / M3 等 Apple Silicon（arm64）
          - runner: macos-latest
            package_label: AppleSilicon-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r folder_manage/requirements.txt pyinstaller
          python -V
          pip -V
          pip freeze

      - name: Build app
        run: |
          pyinstaller people_folder_manager.spec

      - name: Show dist output
        run: |
          ls -la dist || true

      - name: Package app
        run: |
          ZIP_NAME="PeopleFolderManager-${{ matrix.package_label }}.zip"
          if [ -d "dist/PeopleFolderManager.app" ]; then
            ditto -c -k --sequesterRsrc --keepParent "dist/PeopleFolderManager.app" "$ZIP_NAME"
          elif [ -e "dist/PeopleFolderManager" ]; then
            ditto -c -k --sequesterRsrc --keepParent "dist/PeopleFolderManager" "$ZIP_NAME"
          else
            echo "Build output not found in dist/"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: PeopleFolderManager-${{ matrix.package_label }}
          path: PeopleFolderManager-${{ matrix.package_label }}.zip
