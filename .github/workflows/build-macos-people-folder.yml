name: Build macOS (PeopleFolderManager Tauri)

on:
  workflow_dispatch:
  push:
    tags:
      - "people-v*"

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            package_label: Intel-x86_64
          - runner: macos-latest
            package_label: AppleSilicon-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r folder_manage/requirements.txt pyinstaller
          python -V
          pip -V

      - name: Install Node dependencies
        run: |
          npm ci
          npm ci --prefix frontend

      - name: Generate icons
        run: |
          npm run icons
          bash scripts/generate_macos_icons.sh

      - name: Build Python sidecar
        run: |
          npm run sidecar:mac

      - name: Smoke test api-server sidecar
        run: |
          bash scripts/smoke_test_sidecar.sh

      - name: Build Tauri app
        run: |
          npm run tauri:build -- --bundles app

      - name: Show bundle output
        run: |
          find src-tauri/target/release/bundle -maxdepth 3 -print || true

      - name: Ad-hoc sign app bundle
        run: |
          APP_PATH="$(find src-tauri/target/release/bundle/macos -maxdepth 1 -name '*.app' -print -quit)"
          if [ -z "$APP_PATH" ]; then
            echo "Tauri .app output not found"
            exit 1
          fi

          echo "Signing bundle: $APP_PATH"

          # 先把 bundle 內的可執行檔都簽掉，包含 sidecar
          if [ -d "$APP_PATH/Contents/MacOS" ]; then
            find "$APP_PATH/Contents/MacOS" -type f -print0 | while IFS= read -r -d '' BIN; do
              chmod +x "$BIN" || true
              codesign --force --sign - --timestamp=none "$BIN"
            done
          fi

          # 若有 frameworks / dylib，也一起簽
          if [ -d "$APP_PATH/Contents/Frameworks" ]; then
            find "$APP_PATH/Contents/Frameworks" \( -name '*.dylib' -o -name '*.framework' -o -name '*.so' \) -print0 | while IFS= read -r -d '' ITEM; do
              codesign --force --sign - --timestamp=none --deep "$ITEM"
            done
          fi

          # 最後整包再簽一次
          codesign --force --sign - --timestamp=none --deep "$APP_PATH"

          # 驗證
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

      - name: Package app
        run: |
          ZIP_NAME="PeopleFolderManager-${{ matrix.package_label }}.zip"
          APP_PATH="$(find src-tauri/target/release/bundle/macos -maxdepth 1 -name '*.app' -print -quit)"
          if [ -n "$APP_PATH" ]; then
            ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$ZIP_NAME"
          else
            echo "Tauri .app output not found"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: PeopleFolderManager-${{ matrix.package_label }}
          path: PeopleFolderManager-${{ matrix.package_label }}.zip
          retention-days: 1